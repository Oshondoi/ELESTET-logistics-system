<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 55 55">
  <!-- Е: левая вертикаль + 3 горизонтали (верх, середина, низ) -->
  <path d="M5,5 L5,50 L15,50 L15,45 L10,45 L10,30 L15,30 L15,25 L10,25 L10,10 L15,10 L15,5 Z" fill="#111"/>
  <!-- А: две вертикали + верхняя перекладина + средняя, с вырезом внутри -->
  <path d="M20,5 L20,50 L25,50 L25,30 L30,30 L30,50 L35,50 L35,5 Z M25,10 L30,10 L30,25 L25,25 Z" fill="#111" fill-rule="evenodd"/>
  <!-- С: левая вертикаль + верхняя и нижняя горизонтали -->
  <path d="M40,5 L40,50 L50,50 L50,45 L45,45 L45,10 L50,10 L50,5 Z" fill="#111"/>
</svg>
